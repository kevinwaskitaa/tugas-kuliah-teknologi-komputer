<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="styleguide.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="element-checkout">
      <div class="text-wrapper">Alamat Pengiriman</div>
      <div class="rectangle"></div>
      <img class="vector" src="img/vector.svg" />
      <img class="bxs-chevron-right" src="img/bxs-chevron-right.svg" />
      <p class="rumah-keysha-jl">Rumah Keysha - Jl. Teknologi No. 8<br />Kelurahan Bantar Asri</p>
      <div class="div"></div>
      <div class="checkout">
        <img class="img" src="img/mingcute-arrow-left-fill.svg" />
        <div class="text-wrapper-2">Checkout</div>
      </div>
      <div class="text-wrapper-3">Metode Pembayaran</div>
      <div class="metod-pembayaran">
        <div class="rectangle-2"></div>
        <div class="text-wrapper-4">DANA</div>
        <div class="ellipse"></div>
        <img class="bytesize-creditcard" src="img/bytesize-creditcard.svg" />
      </div>
      <div class="metod-pembayaran-2">
        <div class="rectangle-2"></div>
        <div class="DANA">OVO</div>
        <div class="ellipse-2"></div>
        <img class="bytesize-creditcard" src="img/bytesize-creditcard.svg" />
      </div>
      <div class="metod-pembayaran-3">
        <div class="rectangle-2"></div>
        <div class="DANA-2">Gopay</div>
        <div class="ellipse-2"></div>
        <img class="bytesize-creditcard" src="img/bytesize-creditcard.svg" />
      </div>
      <div class="text-wrapper-5">Subtotal Produk: Rp 108.000</div>
      <div class="text-wrapper-6">Biaya Pengiriman: Rp 8.000</div>
      <div class="text-wrapper-7">Total Bayar: Rp. 116.000</div>
      <div class="enkripsi-pembayaran">
        <div class="pembayaran-aman">Pembayaran Aman &amp; Terenkripsi</div>
        <img class="img" src="img/mdi-password-outline.svg" />
      </div>
      <button class="button"><div class="konfirmasi-pesanan">Bayar Sekarang</div></button>
    </div>
  </body>
</html>
