<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="styleguide.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="element-register">
      <div class="text-wrapper">Daftar Akun Baru</div>
      <p class="div">Lengkapi data anda untuk mulai memesan kopi</p>
      <div class="input-field">
        <img class="text-on-a-path" src="img/text-on-a-path-4.svg" />
        <div class="text-wrapper-2">Masukkan Nama Lengkap</div>
      </div>
      <div class="input-field-state">
        <img class="img" src="img/text-on-a-path.svg" />
        <input class="masukkan-password" placeholder="Masukkan Email" type="email" />
      </div>
      <div class="input-field-2">
        <img class="text-on-a-path-2" src="img/text-on-a-path-3.svg" />
        <div class="text-wrapper-2">Masukkan Nomor Telepon</div>
      </div>
      <div class="input-field-3">
        <img class="text-on-a-path-3" src="img/text-on-a-path-2.svg" />
        <div class="text-wrapper-2">Masukkan Password</div>
      </div>
      <div class="daftar"><div class="masuk">Daftar</div></div>
      <div class="rectangle"></div>
      <div class="group">
        <img class="vector" src="img/image.svg" />
        <img class="vector-2" src="img/vector-2.svg" />
        <img class="vector-3" src="img/vector.svg" />
      </div>
      <img class="ic-outline-email" src="img/ic-outline-email.svg" />
      <img class="mdi-password-outline" src="img/mdi-password-outline.svg" />
      <img class="line-md-phone" src="img/line-md-phone.svg" />
      <img class="cuida-user-outline" src="img/cuida-user-outline.svg" />
    </div>
  </body>
</html>
